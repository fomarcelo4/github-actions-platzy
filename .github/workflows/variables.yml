name: Uso de variables
run-name: Ejercicio con variables
on: 
  workflow_dispatch
env:
  DIA_DE_SEMANA: Martes
jobs:
  inicio:
    runs-on: ubuntu-latest
    env:
      SALUDO: Hola
    steps:
      - name: Saludar
        run: echo "$SALUDO, soy $NOMBRE. Hoy es $DIA_DE_SEMANA, estoy en $PAIS."
        env:
          NOMBRE: Fredy
