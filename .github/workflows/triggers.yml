name: Triggers con Github Actions
run-name: Probando los diferentes triggers de Github Actions
on:
  push:
    branches: 
      - 'main'
      - 'aprendiendo-**'
    paths: 
      - '**.py'
  pull_request:
    types: 
      - [opened, labeled]
    branches: 
      - 'main'
      - 'aprendiendo-**'
    paths: 
      - '**.py'
  schedule:
    - cron: '0 0 1 * *'
jobs:
  job-fredy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4
      - name: Define Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Define Variable IP
        id: ip
        uses: haythem/public-ip@v1.3
      - name: Defina Variable USERNAME
        run: echo "USERNAME=${{ github.actor }}" >> $GITHUB_ENV
      - name: Run script
        run: |
          echo "Hello from IP: ${{ steps.ip.outputs.ipv4 }}"
          python hola.py
    
